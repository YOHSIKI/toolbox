<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}central-sports-web{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ asset_version|default('0') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='/img/favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', path='/img/favicon-192.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='/img/favicon-192.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', path='/img/favicon.ico') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
  <script>
    // フォーム submit 時、送信ボタンを disable + ラベル切替して連打と実行中表示を統一
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('form').forEach(function(form) {
        form.addEventListener('submit', function() {
          var targets = Array.from(form.querySelectorAll('button[type=submit]'));
          document.querySelectorAll('button[form]').forEach(function(b) {
            if (b.getAttribute('form') === form.id) targets.push(b);
          });
          targets.forEach(function(btn) {
            var lbl = btn.getAttribute('data-loading-text');
            if (lbl) btn.textContent = lbl;
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.style.cursor = 'progress';
          });
        });
      });
    });
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="app">
    {% include "partials/sidebar.html" %}
    <main class="main">
      {% include "partials/topbar.html" %}
      <section id="hx-main" class="content stack {% block content_stack %}stack-md{% endblock %}">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>
</body>
</html>
