<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" font-family="-apple-system, system-ui, 'Noto Sans JP', sans-serif">
  <defs>
    <style>
      .bg    { fill: #f7f7f5; }
      .card  { fill: #ffffff; stroke: #d4d4d1; stroke-width: 1; }
      .accent-line { fill: #c2410c; }
      .num   { font-size: 16px; font-weight: 700; fill: #c2410c; }
      .num-circle { fill: #fff4ed; stroke: #fed7aa; stroke-width: 1; }
      .title { font-size: 14px; font-weight: 600; fill: #0a0a0a; letter-spacing: -0.01em; }
      .subtitle { font-size: 11px; fill: #6b7280; }
      .arrow { fill: none; stroke: #8a8a84; stroke-width: 1.4; }
      .eyebrow  { font-size: 10px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.12em; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a84"/>
    </marker>
  </defs>

  <rect class="bg" width="720" height="760"/>
  <text x="40" y="36" class="eyebrow">CENTRAL-SPORTS-WEB</text>
  <text x="40" y="56" class="title" style="font-size:16px;">データの流れ（月次・週次・日次）</text>

  <g transform="translate(80, 90)">
    <rect class="card" width="560" height="76" rx="6"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">1</text>
    <text x="70" y="32" class="title">月初 · 公開月間 API から月間テンプレートを取得</text>
    <text x="70" y="52" class="subtitle">翌月分を永続ストアのスケジュールキャッシュに保存</text>
  </g>

  <path class="arrow" d="M 360 170 L 360 188" marker-end="url(#ah)"/>

  <g transform="translate(80, 200)">
    <rect class="card" width="560" height="76" rx="6"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">2</text>
    <text x="70" y="32" class="title">週次 · 差分を取り直す</text>
    <text x="70" y="52" class="subtitle">代行や時間変更をキャッシュに反映</text>
  </g>

  <path class="arrow" d="M 360 280 L 360 298" marker-end="url(#ah)"/>

  <g transform="translate(80, 310)">
    <rect class="card" width="560" height="76" rx="6"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">3</text>
    <text x="70" y="32" class="title">画面アクセス時 · 直近 1 週間の実スケジュール取得</text>
    <text x="70" y="52" class="subtitle">予約 API から取り、月間テンプレートに重ねてカレンダー描画</text>
  </g>

  <path class="arrow" d="M 360 390 L 360 408" marker-end="url(#ah)"/>

  <g transform="translate(80, 420)">
    <rect class="card" width="560" height="76" rx="6"/>
    <rect class="accent-line" x="0" y="0" width="3" height="76"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">4</text>
    <text x="70" y="32" class="title">利用者 · カレンダーから定期予約を登録</text>
    <text x="70" y="52" class="subtitle">曜日・時刻・プログラム ID・希望席を永続ストアに保存</text>
  </g>

  <path class="arrow" d="M 360 500 L 360 518" marker-end="url(#ah)"/>

  <g transform="translate(80, 530)">
    <rect class="card" width="560" height="76" rx="6"/>
    <rect class="accent-line" x="0" y="0" width="3" height="76"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">5</text>
    <text x="70" y="32" class="title">毎朝 8:55 · 事前ログイン＋対象レッスン解決</text>
    <text x="70" y="52" class="subtitle">Discord に準備完了を通知</text>
  </g>

  <path class="arrow" d="M 360 610 L 360 628" marker-end="url(#ah)"/>

  <g transform="translate(80, 640)">
    <rect class="card" width="560" height="76" rx="6"/>
    <rect class="accent-line" x="0" y="0" width="3" height="76"/>
    <circle class="num-circle" cx="32" cy="38" r="20"/>
    <text x="32" y="44" class="num" text-anchor="middle">6</text>
    <text x="70" y="32" class="title">毎朝 9:00 · 希望席の順に予約 POST を試行</text>
    <text x="70" y="52" class="subtitle">成功で停止・失敗は次の候補・全滅で通知のみ</text>
  </g>

</svg>
