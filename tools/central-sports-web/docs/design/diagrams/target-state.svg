<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="-apple-system, system-ui, 'Noto Sans JP', sans-serif">
  <defs>
    <style>
      .bg    { fill: #f7f7f5; }
      .state { fill: #ffffff; stroke: #a8a8a4; stroke-width: 1; }
      .state-active    { fill: #ffffff; stroke: #0a0a0a; stroke-width: 1.5; }
      .state-running   { fill: #fff4ed; stroke: #c2410c; stroke-width: 1.5; }
      .state-succeeded { fill: #f0fdf4; stroke: #15803d; stroke-width: 1; }
      .state-failed    { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1; }
      .state-skipped   { fill: #fafaf8; stroke: #a8a8a4; stroke-width: 1; }
      .state-disabled  { fill: #ececea; stroke: #a8a8a4; stroke-width: 1; stroke-dasharray: 3,2; }
      .lbl   { font-size: 13px; font-weight: 600; fill: #0a0a0a; text-anchor: middle; }
      .lbl-sub { font-size: 10px; fill: #6b7280; text-anchor: middle; }
      .edge-lbl { font-size: 10px; fill: #6b7280; text-anchor: middle; }
      .arrow { fill: none; stroke: #8a8a84; stroke-width: 1.4; }
      .arrow-a { fill: none; stroke: #c2410c; stroke-width: 1.6; }
      .eyebrow  { font-size: 10px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.12em; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a84"/>
    </marker>
    <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect class="bg" width="720" height="560"/>
  <text x="40" y="32" class="eyebrow">STATE MACHINE</text>
  <text x="40" y="52" fill="#0a0a0a" font-size="16" font-weight="600">定期予約の状態遷移</text>

  <!-- 有効 -->
  <g transform="translate(280, 90)">
    <rect class="state-active" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl">有効</text>
    <text x="80" y="44" class="lbl-sub">次の実行を待機中</text>
  </g>

  <!-- 一時停止 (左) -->
  <g transform="translate(60, 90)">
    <rect class="state-disabled" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl">一時停止</text>
    <text x="80" y="44" class="lbl-sub">手動で OFF</text>
  </g>

  <!-- 予定済み -->
  <g transform="translate(280, 200)">
    <rect class="state" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl">予定済み</text>
    <text x="80" y="44" class="lbl-sub">実行直前</text>
  </g>

  <!-- 実行中 -->
  <g transform="translate(280, 300)">
    <rect class="state-running" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl">実行中</text>
    <text x="80" y="44" class="lbl-sub">9:00 · 予約 POST 試行</text>
  </g>

  <!-- 成功 -->
  <g transform="translate(60, 420)">
    <rect class="state-succeeded" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl" fill="#15803d">成功</text>
    <text x="80" y="44" class="lbl-sub">予約確保</text>
  </g>

  <!-- 失敗 -->
  <g transform="translate(280, 420)">
    <rect class="state-failed" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl" fill="#b91c1c">失敗</text>
    <text x="80" y="44" class="lbl-sub">API エラー等</text>
  </g>

  <!-- スキップ -->
  <g transform="translate(500, 420)">
    <rect class="state-skipped" width="160" height="56" rx="6"/>
    <text x="80" y="28" class="lbl">スキップ</text>
    <text x="80" y="44" class="lbl-sub">候補席すべて満席</text>
  </g>

  <!-- arrows -->
  <!-- 有効 <-> 一時停止 -->
  <path class="arrow" d="M 280 110 L 220 110" marker-end="url(#ah)"/>
  <text x="250" y="104" class="edge-lbl">手動停止</text>
  <path class="arrow" d="M 220 130 L 280 130" marker-end="url(#ah)"/>
  <text x="250" y="146" class="edge-lbl">手動再開</text>

  <!-- 有効 → 予定済み -->
  <path class="arrow" d="M 360 146 L 360 198" marker-end="url(#ah)"/>
  <text x="420" y="176" class="edge-lbl" text-anchor="start">実行予定時刻が近づく</text>

  <!-- 予定済み → 実行中 -->
  <path class="arrow-a" d="M 360 256 L 360 298" marker-end="url(#ah-a)"/>
  <text x="420" y="282" class="edge-lbl" text-anchor="start" fill="#c2410c">9:00 ちょうど</text>

  <!-- 実行中 → 成功 -->
  <path class="arrow" d="M 290 356 Q 250 390 170 418" marker-end="url(#ah)"/>
  <text x="200" y="386" class="edge-lbl">希望席が取れた</text>

  <!-- 実行中 → 失敗 -->
  <path class="arrow" d="M 360 356 L 360 418" marker-end="url(#ah)"/>
  <text x="420" y="388" class="edge-lbl" text-anchor="start">応答が異常</text>

  <!-- 実行中 → スキップ -->
  <path class="arrow" d="M 430 356 Q 470 390 550 418" marker-end="url(#ah)"/>
  <text x="520" y="386" class="edge-lbl">候補席すべて満席</text>

  <!-- 成功/失敗/スキップ → 有効（翌週リセット）-->
  <path class="arrow" d="M 140 420 Q 100 300 100 160" marker-end="url(#ah)"/>
  <path class="arrow" d="M 620 420 Q 660 300 660 160" marker-end="url(#ah)"/>
  <text x="100" y="280" class="edge-lbl" text-anchor="end">翌週に向け再待機</text>
  <text x="660" y="280" class="edge-lbl" text-anchor="start">翌週に向け再待機</text>
  <path class="arrow" d="M 100 160 Q 100 120 278 110" marker-end="url(#ah)"/>
  <path class="arrow" d="M 660 160 Q 660 120 442 110" marker-end="url(#ah)"/>

</svg>
