<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, system-ui, 'Noto Sans JP', sans-serif">
  <defs>
    <style>
      .bg       { fill: #f7f7f5; }
      .card     { fill: #ffffff; stroke: #d4d4d1; stroke-width: 1; }
      .card-ext { fill: #f4f4f2; stroke: #d4d4d1; stroke-width: 1; }
      .card-sub { fill: #fafaf8; stroke: #d4d4d1; stroke-width: 1; }
      .accent-line { fill: #c2410c; }
      .title    { font-size: 14px; font-weight: 600; fill: #0a0a0a; letter-spacing: -0.01em; }
      .subtitle { font-size: 11px; fill: #6b7280; }
      .label    { font-size: 12px; fill: #0a0a0a; font-weight: 500; }
      .muted    { font-size: 10px; fill: #8a8a84; }
      .arrow    { fill: none; stroke: #8a8a84; stroke-width: 1.4; }
      .arrow-a  { fill: none; stroke: #c2410c; stroke-width: 1.6; }
      .eyebrow  { font-size: 10px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.12em; }
      .tech     { font-size: 10px; fill: #6b7280; font-family: 'JetBrains Mono', ui-monospace, monospace; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a84"/>
    </marker>
    <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="520"/>
  <text x="40" y="32" class="eyebrow">ARCHITECTURE</text>
  <text x="40" y="52" fill="#0a0a0a" font-size="16" font-weight="600">システム構成 · 技術的な詳細</text>

  <!-- ブラウザ -->
  <g transform="translate(30, 220)">
    <rect class="card-ext" width="160" height="100" rx="6"/>
    <text x="80" y="32" class="title" text-anchor="middle">ブラウザ</text>
    <text x="80" y="52" class="subtitle" text-anchor="middle">HTTPS · Basic 認証</text>
    <text x="80" y="70" class="tech" text-anchor="middle">Cookie セッション</text>
    <text x="80" y="87" class="muted" text-anchor="middle">SSR テンプレート描画</text>
  </g>

  <!-- central-sports-web -->
  <g transform="translate(240, 100)">
    <rect class="accent-line" x="0" y="0" width="3" height="340"/>
    <rect class="card" x="3" y="0" width="400" height="340" rx="6"/>
    <text x="22" y="28" class="eyebrow">CENTRAL-SPORTS-WEB</text>
    <text x="22" y="52" class="title">Python / FastAPI / APScheduler</text>
    <text x="22" y="70" class="subtitle">非同期 HTTP サーバ · 同期クライアントを別スレッド実行</text>
    <line x1="22" y1="86" x2="378" y2="86" stroke="#e5e5e5" stroke-width="1"/>

    <g transform="translate(22, 100)">
      <rect class="card-sub" width="172" height="96" rx="4"/>
      <text x="14" y="22" class="label">プレゼン層</text>
      <text x="14" y="42" class="subtitle">Jinja2 テンプレート</text>
      <text x="14" y="58" class="subtitle">ダッシュボード</text>
      <text x="14" y="74" class="subtitle">単発予約 / 定期予約タブ</text>
      <text x="14" y="90" class="tech">最小限の JS</text>
    </g>

    <g transform="translate(210, 100)">
      <rect class="card-sub" width="172" height="96" rx="4"/>
      <text x="14" y="22" class="label">アプリ層</text>
      <text x="14" y="42" class="subtitle">予約ユースケース</text>
      <text x="14" y="58" class="subtitle">配置プレビュー生成</text>
      <text x="14" y="74" class="subtitle">当日サマリー集計</text>
      <text x="14" y="90" class="subtitle">定期予約マッチング</text>
    </g>

    <g transform="translate(22, 212)">
      <rect class="card-sub" width="172" height="116" rx="4"/>
      <text x="14" y="22" class="label">外部連携層</text>
      <text x="14" y="42" class="subtitle">セッション管理</text>
      <text x="14" y="58" class="subtitle">TLS 指紋互換クライアント</text>
      <text x="14" y="74" class="tech">curl_cffi (Chrome 相当)</text>
      <text x="14" y="92" class="tech">device_id Cookie</text>
      <text x="14" y="108" class="subtitle">Discord Webhook</text>
    </g>

    <g transform="translate(210, 212)">
      <rect class="card-sub" width="172" height="116" rx="4"/>
      <text x="14" y="22" class="label">永続化層</text>
      <text x="14" y="42" class="subtitle">SQLite · WAL</text>
      <text x="14" y="58" class="subtitle">書き込み直列化キュー</text>
      <text x="14" y="74" class="subtitle">月次 JSON バックアップ</text>
      <text x="14" y="92" class="tech">トランザクション単位</text>
      <text x="14" y="108" class="tech">履歴: 90 日 / 予約: 365 日</text>
    </g>
  </g>

  <!-- 予約 API -->
  <g transform="translate(690, 70)">
    <rect class="card-ext" width="190" height="106" rx="6"/>
    <text x="95" y="30" class="title" text-anchor="middle">予約 API</text>
    <text x="95" y="48" class="subtitle" text-anchor="middle">reserve.central.co.jp</text>
    <text x="95" y="66" class="tech" text-anchor="middle">HTTPS · Cookie 認証</text>
    <text x="95" y="82" class="tech" text-anchor="middle">hacomono 内部 API</text>
    <text x="95" y="98" class="muted" text-anchor="middle">非公開 · 仕様変更で追従</text>
  </g>

  <!-- 公開月間 API -->
  <g transform="translate(690, 190)">
    <rect class="card-ext" width="190" height="90" rx="6"/>
    <text x="95" y="30" class="title" text-anchor="middle">公開月間 API</text>
    <text x="95" y="48" class="subtitle" text-anchor="middle">www.central.co.jp</text>
    <text x="95" y="66" class="tech" text-anchor="middle">HTTPS · JSONP</text>
    <text x="95" y="82" class="muted" text-anchor="middle">認証なし · 月次・週次</text>
  </g>

  <!-- Discord -->
  <g transform="translate(690, 296)">
    <rect class="card-ext" width="190" height="76" rx="6"/>
    <text x="95" y="28" class="title" text-anchor="middle">Discord</text>
    <text x="95" y="46" class="tech" text-anchor="middle">HTTPS · Webhook URL</text>
    <text x="95" y="62" class="muted" text-anchor="middle">Embed 通知</text>
  </g>

  <!-- シークレットストア -->
  <g transform="translate(240, 460)">
    <rect class="card-ext" width="400" height="40" rx="6"/>
    <text x="440" y="26" class="subtitle" text-anchor="end">/workspace/.secrets/</text>
    <text x="18" y="26" class="title">シークレットストア</text>
    <text x="160" y="26" class="tech" text-anchor="start">· Fernet 復号 · ro マウント</text>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M 190 270 L 243 250" marker-end="url(#ah)"/>
  <text x="215" y="262" class="muted" text-anchor="middle">HTTPS</text>

  <path class="arrow-a" d="M 640 180 Q 670 150 690 130" marker-end="url(#ah-a)"/>
  <text x="690" y="145" class="tech" text-anchor="end">予約 / 認証</text>

  <path class="arrow" d="M 640 250 L 690 230" marker-end="url(#ah)"/>
  <text x="685" y="222" class="tech" text-anchor="end">月間取得</text>

  <path class="arrow" d="M 640 310 L 690 320" marker-end="url(#ah)"/>
  <text x="685" y="308" class="tech" text-anchor="end">通知</text>

  <path class="arrow" d="M 440 460 L 440 440" marker-end="url(#ah)"/>
  <text x="456" y="455" class="muted" text-anchor="start">復号</text>

</svg>
