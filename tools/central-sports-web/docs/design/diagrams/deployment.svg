<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system, system-ui, 'Noto Sans JP', sans-serif">
  <defs>
    <style>
      .bg      { fill: #f7f7f5; }
      .card    { fill: #ffffff; stroke: #d4d4d1; stroke-width: 1; }
      .card-ro { fill: #fafaf8; stroke: #d4d4d1; stroke-width: 1; stroke-dasharray: 4,2; }
      .nas     { fill: none; stroke: #a8a8a4; stroke-width: 1.5; stroke-dasharray: 5,3; }
      .docker  { fill: none; stroke: #c2410c; stroke-width: 1.5; stroke-dasharray: 5,3; }
      .title   { font-size: 14px; font-weight: 600; fill: #0a0a0a; letter-spacing: -0.01em; }
      .subtitle { font-size: 11px; fill: #6b7280; }
      .label    { font-size: 12px; fill: #0a0a0a; font-weight: 500; }
      .muted    { font-size: 10px; fill: #8a8a84; }
      .arrow    { fill: none; stroke: #8a8a84; stroke-width: 1.4; }
      .eyebrow  { font-size: 10px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.12em; }
      .group-lbl { font-size: 11px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.1em; }
      .docker-lbl { font-size: 11px; font-weight: 600; fill: #c2410c; letter-spacing: 0.1em; }
    </style>
  </defs>

  <rect class="bg" width="760" height="480"/>
  <text x="40" y="32" class="eyebrow">DEPLOYMENT</text>
  <text x="40" y="52" fill="#0a0a0a" font-size="16" font-weight="600">Synology NAS 上の配置</text>

  <!-- NAS 枠 -->
  <rect class="nas" x="40" y="80" width="680" height="380" rx="8"/>
  <text x="60" y="104" class="group-lbl">SYNOLOGY NAS（ホスト）</text>

  <!-- 永続ボリュームグループ -->
  <text x="60" y="138" class="group-lbl">永続ボリューム</text>

  <g transform="translate(60, 150)">
    <rect class="card" width="280" height="110" rx="6"/>
    <text x="20" y="28" class="title">toolbox ボリューム</text>
    <text x="20" y="48" class="subtitle">ソースコード + SQLite DB</text>
    <line x1="20" y1="62" x2="260" y2="62" stroke="#e5e5e5"/>
    <text x="20" y="82" class="muted">· 読み書き可能</text>
    <text x="20" y="98" class="muted">· 週次で JSON バックアップ</text>
  </g>

  <g transform="translate(360, 150)">
    <rect class="card-ro" width="340" height="110" rx="6"/>
    <text x="20" y="28" class="title">シークレットボリューム</text>
    <text x="20" y="48" class="subtitle">暗号化シークレット + マスター鍵</text>
    <line x1="20" y1="62" x2="320" y2="62" stroke="#e5e5e5"/>
    <text x="20" y="82" class="muted">· 読み取り専用マウント</text>
    <text x="20" y="98" class="muted">· Fernet 復号はコンテナ内メモリのみ</text>
  </g>

  <!-- Docker 枠 -->
  <rect class="docker" x="60" y="290" width="640" height="150" rx="8"/>
  <text x="80" y="312" class="docker-lbl">DOCKER</text>

  <!-- central-sports-web コンテナ -->
  <g transform="translate(220, 318)">
    <rect class="card" width="320" height="110" rx="6"/>
    <text x="20" y="28" class="title">central-sports-web</text>
    <text x="20" y="48" class="subtitle">単一コンテナで全機能を稼働</text>
    <line x1="20" y1="62" x2="300" y2="62" stroke="#e5e5e5"/>
    <text x="20" y="82" class="muted">· restart: always（NAS 再起動時も自動起動）</text>
    <text x="20" y="98" class="muted">· TZ=Asia/Tokyo</text>
  </g>

  <!-- ポート -->
  <g transform="translate(20, 420)">
    <rect class="card" x="40" y="-18" width="680" height="36" rx="6"/>
    <text x="60" y="4" class="title">LAN 内限定ポート</text>
    <text x="720" y="4" class="subtitle" text-anchor="end">HTTPS · Basic 認証 · デプロイ時に割当</text>
  </g>

  <!-- arrows: ボリューム → コンテナ -->
  <path class="arrow" d="M 200 260 L 320 318"/>
  <text x="245" y="294" class="muted">rw bind mount</text>

  <path class="arrow" d="M 530 260 L 440 318"/>
  <text x="500" y="294" class="muted" text-anchor="end">ro bind mount</text>

  <!-- コンテナ → ポート -->
  <path class="arrow" d="M 380 428 L 380 414"/>
  <text x="390" y="420" class="muted">公開</text>

</svg>
