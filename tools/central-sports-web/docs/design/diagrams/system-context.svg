<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="-apple-system, system-ui, 'Noto Sans JP', sans-serif">
  <defs>
    <style>
      .bg       { fill: #f7f7f5; }
      .card     { fill: #ffffff; stroke: #d4d4d1; stroke-width: 1; }
      .card-ext { fill: #f4f4f2; stroke: #d4d4d1; stroke-width: 1; }
      .card-sub { fill: #fafaf8; stroke: #d4d4d1; stroke-width: 1; }
      .accent-line { fill: #c2410c; }
      .title    { font-size: 14px; font-weight: 600; fill: #0a0a0a; letter-spacing: -0.01em; }
      .subtitle { font-size: 11px; fill: #6b7280; }
      .label    { font-size: 12px; fill: #0a0a0a; font-weight: 500; }
      .muted    { font-size: 10px; fill: #8a8a84; }
      .arrow    { fill: none; stroke: #8a8a84; stroke-width: 1.4; }
      .arrow-a  { fill: none; stroke: #c2410c; stroke-width: 1.6; }
      .eyebrow  { font-size: 10px; font-weight: 600; fill: #8a8a84; letter-spacing: 0.12em; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a84"/>
    </marker>
    <marker id="ah-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect class="bg" width="880" height="480"/>

  <g transform="translate(30, 200)">
    <rect class="card-ext" width="170" height="80" rx="6"/>
    <text x="85" y="35" class="title" text-anchor="middle">利用者ブラウザ</text>
    <text x="85" y="55" class="subtitle" text-anchor="middle">ダッシュボード</text>
    <text x="85" y="70" class="subtitle" text-anchor="middle">予約画面（タブ切替）</text>
  </g>

  <g transform="translate(260, 90)">
    <rect class="accent-line" x="0" y="0" width="3" height="300"/>
    <rect class="card" x="3" y="0" width="357" height="300" rx="6"/>
    <text x="22" y="28" class="eyebrow">CENTRAL-SPORTS-WEB</text>
    <text x="22" y="52" class="title">Synology NAS 上の常駐コンテナ</text>
    <text x="22" y="70" class="subtitle">単一プロセス・単一 SQLite</text>
    <line x1="22" y1="85" x2="338" y2="85" stroke="#e5e5e5" stroke-width="1"/>

    <g transform="translate(22, 100)">
      <rect class="card-sub" width="150" height="82" rx="4"/>
      <text x="14" y="24" class="label">Web アプリ本体</text>
      <text x="14" y="44" class="subtitle">HTTP ルーティング</text>
      <text x="14" y="60" class="subtitle">HTML テンプレート</text>
      <text x="14" y="76" class="subtitle">Basic 認証</text>
    </g>
    <g transform="translate(188, 100)">
      <rect class="card-sub" width="150" height="82" rx="4"/>
      <text x="14" y="24" class="label">セッション管理</text>
      <text x="14" y="44" class="subtitle">認証トークン保持</text>
      <text x="14" y="60" class="subtitle">自動再ログイン</text>
      <text x="14" y="76" class="subtitle">TLS 指紋互換通信</text>
    </g>
    <g transform="translate(22, 198)">
      <rect class="card-sub" width="150" height="82" rx="4"/>
      <text x="14" y="24" class="label">スケジューラ</text>
      <text x="14" y="44" class="subtitle">毎朝 9:00 の予約実行</text>
      <text x="14" y="60" class="subtitle">月次・週次の同期</text>
      <text x="14" y="76" class="subtitle">準備ジョブ（8:55）</text>
    </g>
    <g transform="translate(188, 198)">
      <rect class="card-sub" width="150" height="82" rx="4"/>
      <text x="14" y="24" class="label">永続ストア</text>
      <text x="14" y="44" class="subtitle">定期予約・予約結果</text>
      <text x="14" y="60" class="subtitle">履歴・キャッシュ</text>
      <text x="14" y="76" class="subtitle">書き込み直列化</text>
    </g>
  </g>

  <g transform="translate(680, 60)">
    <rect class="card-ext" width="180" height="90" rx="6"/>
    <text x="90" y="30" class="title" text-anchor="middle">予約 API</text>
    <text x="90" y="48" class="subtitle" text-anchor="middle">reserve.central.co.jp</text>
    <text x="90" y="65" class="subtitle" text-anchor="middle">Cookie 認証（hacomono）</text>
    <text x="90" y="80" class="muted" text-anchor="middle">ログイン・予約・取消</text>
  </g>

  <g transform="translate(680, 170)">
    <rect class="card-ext" width="180" height="80" rx="6"/>
    <text x="90" y="30" class="title" text-anchor="middle">公開月間 API</text>
    <text x="90" y="48" class="subtitle" text-anchor="middle">www.central.co.jp</text>
    <text x="90" y="65" class="subtitle" text-anchor="middle">JSONP（認証なし）</text>
  </g>

  <g transform="translate(680, 270)">
    <rect class="card-ext" width="180" height="70" rx="6"/>
    <text x="90" y="30" class="title" text-anchor="middle">Discord</text>
    <text x="90" y="48" class="subtitle" text-anchor="middle">Webhook</text>
    <text x="90" y="63" class="muted" text-anchor="middle">結果・障害通知</text>
  </g>

  <g transform="translate(260, 410)">
    <rect class="card-ext" width="360" height="55" rx="6"/>
    <text x="180" y="25" class="title" text-anchor="middle">シークレットストア</text>
    <text x="180" y="42" class="subtitle" text-anchor="middle">読み取り専用マウント · Fernet 復号（メモリ上のみ保持）</text>
  </g>

  <path class="arrow" d="M 200 240 L 263 230" marker-end="url(#ah)"/>
  <text x="231" y="222" class="muted" text-anchor="middle">HTTPS</text>

  <path class="arrow-a" d="M 620 140 Q 650 130 680 110" marker-end="url(#ah-a)"/>
  <text x="622" y="125" class="muted" text-anchor="start">認証・予約</text>

  <path class="arrow" d="M 620 200 L 680 210" marker-end="url(#ah)"/>
  <text x="625" y="192" class="muted" text-anchor="start">月間取得</text>

  <path class="arrow" d="M 480 390 Q 580 340 680 300" marker-end="url(#ah)"/>
  <text x="540" y="340" class="muted" text-anchor="middle">通知</text>

  <path class="arrow" d="M 440 410 L 440 390" marker-end="url(#ah)"/>
  <text x="456" y="405" class="muted" text-anchor="start">復号</text>

</svg>
